<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RANKS</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--bg:#eae8e4;--board:#dbd8d2;--line:#bbb;--ui:#fff;--sh:0 4px 16px rgba(0,0,0,.10);--gold:#c9a84c;--red:#c0392b;--txt:#2a2a2a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
h1.title{margin:20px 0 10px;letter-spacing:14px;font-size:clamp(2.2rem,6vw,3.6rem);font-weight:900;text-transform:uppercase;color:#1a1a1a;text-align:center;}
.hidden{display:none!important;}
.overlay{position:fixed;inset:0;background:rgba(234,232,228,.98);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:200;}
#lobby-screen input{padding:16px;font-size:1.3rem;text-align:center;border:2px solid #333;margin-bottom:14px;border-radius:6px;width:280px;max-width:80%;text-transform:uppercase;letter-spacing:4px;background:#fff;}
.big-btn{padding:18px 48px;font-size:1.4rem;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:2px;}
#lobby-create{margin-top:14px;padding:12px 28px;font-size:.9rem;background:#fff;color:#333;border:2px solid #ccc;border-radius:8px;cursor:pointer;font-weight:700;text-transform:uppercase;}
#lobby-hint{margin-top:16px;color:#888;font-size:.85rem;text-align:center;max-width:320px;line-height:1.5;}
#lobby-msg{color:var(--red);margin-top:16px;font-weight:bold;}
#game-container{display:flex;flex-direction:column;align-items:center;width:100%;max-width:1100px;padding:0 8px 60px;}
#hud{background:var(--ui);padding:10px 18px;border-radius:10px;box-shadow:var(--sh);width:100%;max-width:860px;margin-bottom:8px;font-size:.82rem;display:flex;gap:16px;justify-content:space-between;flex-wrap:wrap;align-items:center;}
.hud-s{display:flex;flex-direction:column;gap:1px;}.hud-s b{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:#999;}
.hud-s .qv{font-weight:900;font-size:1.05rem;}
#status-msg{font-weight:800;font-size:.88rem;letter-spacing:1px;text-transform:uppercase;padding:8px 18px;background:var(--ui);border-radius:20px;box-shadow:var(--sh);margin-bottom:6px;}
#canvas-wrapper{position:relative;width:min(94vmin,860px);height:min(94vmin,860px);}
canvas{width:100%;height:100%;display:block;border-radius:8px;}
#next-draw{background:var(--ui);padding:12px 24px;border-radius:12px;box-shadow:var(--sh);margin:8px 0;display:flex;flex-direction:column;align-items:center;}
#action-bar{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;justify-content:center;min-height:42px;}
.ab{padding:10px 24px;font-size:.88rem;font-weight:700;border:2px solid #999;border-radius:8px;cursor:pointer;background:var(--ui);text-transform:uppercase;letter-spacing:1px;transition:all .12s;}
.ab:hover{border-color:#333;background:#f5f5f5;}.ab.go{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}.ab.no{border-color:var(--red);color:var(--red);}
#combat-log{background:var(--ui);padding:10px 14px;border-radius:10px;box-shadow:var(--sh);width:100%;max-width:860px;margin-top:10px;max-height:160px;overflow-y:auto;font-family:'SF Mono',Consolas,monospace;font-size:.73rem;line-height:1.5;color:#555;}
#rules-link{margin:8px 0;font-size:.82rem;}.rules-a{color:#888;text-decoration:none;font-weight:600;letter-spacing:1px;text-transform:uppercase;}.rules-a:hover{color:#333;}
#game-over{position:fixed;inset:0;z-index:300;display:flex;justify-content:center;align-items:center;}
#go-bd{position:absolute;inset:0;background:rgba(0,0,0,.55);}
#go-bb{position:relative;background:#fff;border-radius:16px;padding:36px 32px 24px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.25);max-width:420px;width:90%;}
#go-t{font-size:2.2rem;font-weight:900;letter-spacing:4px;margin-bottom:8px;}
#go-r{font-size:.95rem;color:#555;margin-bottom:18px;line-height:1.5;}
.go-b{padding:14px 28px;font-size:1rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;background:#1a1a1a;color:#fff;}
.subtle-btn{background:transparent;color:#888;border:1px solid #ddd;padding:8px 16px;border-radius:6px;font-size:0.75rem;font-weight:700;cursor:pointer;margin-top:16px;letter-spacing:1px;transition:all 0.2s;}
.subtle-btn:hover{color:#333;border-color:#999;}
#peek-flash{position:fixed;top:16%;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:16px 32px;border-radius:40px;font-weight:900;font-size:1.05rem;letter-spacing:2px;z-index:300;box-shadow:0 6px 28px rgba(0,0,0,.3);transition:opacity .4s;}
#waiting-msg{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--ui);color:#555;padding:14px 28px;border-radius:40px;font-weight:700;z-index:200;box-shadow:var(--sh);}
@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-3px,3px)}80%{transform:translate(3px,-1px)}}
@keyframes fadeOut{0%{opacity:1}100%{opacity:0}}
.cap-anim{position:absolute;border-radius:8px;background:rgba(192,57,43,.3);border:3px solid var(--red);pointer-events:none;animation:shake .4s ease-out,fadeOut .6s .3s ease-out forwards;}
@media(max-width:600px){.hud-s{font-size:.72rem;}.ab{padding:8px 16px;font-size:.78rem;}h1.title{letter-spacing:8px;}}
</style>
</head>
<body>
<div id="lobby-screen" class="overlay">
<h1 class="title" style="letter-spacing:16px;">RANKS</h1>
<input type="text" id="room-input" placeholder="ROOM CODE" autocomplete="off" onkeydown="if(event.key==='Enter')joinGame()" oninput="this.value=this.value.toUpperCase()">
<button class="big-btn" onclick="joinGame()">JOIN GAME</button>
<button id="lobby-create" onclick="createRoom()">CREATE ROOM</button>
<p id="lobby-hint">Enter <b>PLAYAI</b> to challenge the AI &middot; Create or enter a room code for 2-player</p>
<p id="lobby-msg"></p>
</div>
<div id="game-container" class="hidden">
<h1 class="title">RANKS</h1>
<div id="hud">
<div class="hud-s"><b>White (P1)</b><span>Supply: <span id="s1">24</span></span><span>Qual: <span class="qv" id="q1">0</span> / <span id="qt1">21</span></span></div>
<div class="hud-s"><b>You</b><span id="pid">...</span></div>
<div class="hud-s"><b>Black (P2)</b><span>Supply: <span id="s2">24</span></span><span>Qual: <span class="qv" id="q2">0</span> / <span id="qt2">21</span></span></div>
</div>
<div id="status-msg">Waiting...</div>
<div id="canvas-wrapper"><canvas id="cv" width="1020" height="1020"></canvas></div>
<div id="next-draw"></div>
<div id="action-bar"></div>
<div id="rules-link"><a class="rules-a" href="rules.html" target="_blank">Rules &rarr;</a></div>
<div id="combat-log" class="hidden"><div id="ll"></div></div>
</div>
<div id="game-over" class="hidden">
    <div id="go-bd"></div>
    <div id="go-bb">
        <div id="go-t">GAME OVER</div>
        <div id="go-r"></div>
        <div><button class="go-b" onclick="location.reload()">MAIN MENU</button></div>
        <div><button class="subtle-btn" id="go-copy" onclick="copyLog()">COPY GAME LOG</button></div>
    </div>
</div>
<div id="peek-flash" class="hidden"></div>
<div id="waiting-msg" class="hidden">Waiting for opponent...</div>
<script>
const socket=io(),cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let state=null,myP=0,roomId=null,pending=null,strikeTarget=null,strikeFrom=null;
const BS=7,CW=1020,MG=60,BPX=CW-MG*2,CL=BPX/BS,TS=CL*.72;
function cX(c){return MG+c*CL+CL/2;}function cY(r){return MG+r*CL+CL/2;}
function $(id){return document.getElementById(id);}

const PIPS={
1:[[.5,.5]],
2:[[.25,.25],[.75,.75]],
3:[[.25,.25],[.5,.5],[.75,.75]],
4:[[.25,.25],[.75,.25],[.25,.75],[.75,.75]],
5:[[.25,.25],[.75,.25],[.5,.5],[.25,.75],[.75,.75]],
6:[[.25,.25],[.75,.25],[.25,.5],[.75,.5],[.25,.75],[.75,.75]]
};

function drawPips(cx,cy,sz,val,color){
    if(val<1||val>6)return;
    const r=sz*.08;
    for(const[px,py]of PIPS[val]){
        const x=cx-sz/2+px*sz,y=cy-sz/2+py*sz;
        ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    }
}

function saveS(){try{sessionStorage.setItem('rr',roomId);sessionStorage.setItem('rp',myP);}catch(e){}}
function clearS(){try{sessionStorage.removeItem('rr');sessionStorage.removeItem('rp');}catch(e){}}
socket.on('connect',()=>{try{const r=sessionStorage.getItem('rr'),p=parseInt(sessionStorage.getItem('rp'));if(r&&p)socket.emit('rejoinGame',{roomId:r,player:p});}catch(e){}});
socket.on('rejoinFailed',()=>{clearS();$('game-container').classList.add('hidden');$('lobby-screen').classList.remove('hidden');});

function joinGame(){const v=$('room-input').value.toUpperCase().trim();if(!v)return;roomId=v;socket.emit('joinGame',roomId);}
function createRoom(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ',code=Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');$('room-input').value=code;$('lobby-msg').innerText=`Room ${code} created.`;}
function sendPie(sw){socket.emit('action',{roomId,type:'pieDecision',swap:sw});}

socket.on('init',d=>{myP=d.player;if(d.roomId)roomId=d.roomId;saveS();$('lobby-screen').classList.add('hidden');$('game-container').classList.remove('hidden');$('waiting-msg').classList.add('hidden');$('pid').innerText=myP===1?'White (P1)':'Black (P2)';draw();});
socket.on('waiting',()=>{$('lobby-screen').classList.add('hidden');$('game-container').classList.remove('hidden');$('waiting-msg').classList.remove('hidden');});
socket.on('update',s=>{
    state=s;pending=null;strikeTarget=null;strikeFrom=null;updateAll();
    if(s.lastCaptures&&s.lastCaptures.length)animCaptures(s.lastCaptures);
});
socket.on('roomFull',()=>{$('lobby-msg').innerText='Room full.';});
socket.on('peekResult',d=>{showFlash(`PEEK (${d.r+1},${d.c+1}): ${d.values.join(', ')}`);});

function animCaptures(caps){
    const wrap=$('canvas-wrapper'),rect=wrap.getBoundingClientRect();
    const scale=rect.width/CW;
    for(const{r,c}of caps){
        const el=document.createElement('div');el.className='cap-anim';
        const px=cX(c)-CL/2,py=cY(r)-CL/2;
        el.style.left=(px*scale)+'px';el.style.top=(py*scale)+'px';
        el.style.width=(CL*scale)+'px';el.style.height=(CL*scale)+'px';
        wrap.appendChild(el);
        setTimeout(()=>el.remove(),1000);
    }
}

function updateAll(){if(!state)return;$('waiting-msg').classList.add('hidden');$('s1').innerText=state.supplies[1];$('s2').innerText=state.supplies[2];
    const qs=state.qualScores||{};$('q1').innerText=qs[1]||0;$('q2').innerText=qs[2]||0;
    const qt=state.qualThreshold||21;$('qt1').innerText=qt;$('qt2').innerText=qt;
    updND();updStatus();updBar();updLog();draw();phaseUI();}

function updND(){
    const el=$('next-draw');
    if(!state||state.myNextDraw===null){
        el.innerHTML='<div style="font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#999;margin-bottom:4px;">Draw:</div><div style="color:#aaa;font-weight:bold;padding:10px 0;">NONE</div>';
        return;
    }
    el.innerHTML='<div style="font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#999;margin-bottom:10px;">Draw:</div><canvas id="nd-cv" width="64" height="64"></canvas>';
    const ndcv=$('nd-cv');
    if(ndcv){
        const nctx=ndcv.getContext('2d');
        const sz=52, cx=32, cy=32, val=state.myNextDraw, owner=myP;
        const h=sz/2;
        nctx.fillStyle=owner===1?'#fafafa':'#1a1a1a';
        nctx.shadowColor='rgba(0,0,0,.15)'; nctx.shadowBlur=6;
        roundRect(nctx,cx-h,cy-h,sz,sz,6); nctx.fill(); nctx.shadowBlur=0;
        
        if(owner===1){
            nctx.strokeStyle='#1a1a1a'; nctx.lineWidth=3.5; 
            roundRect(nctx,cx-h,cy-h,sz,sz,6); nctx.stroke();
        }
        
        if(val>=1 && val<=6){
            const pSz=sz*0.7; 
            const pr=pSz*.08;
            nctx.fillStyle=owner===1?'#1a1a1a':'#fff';
            for(const[px,py]of PIPS[val]){
                const x=cx-pSz/2+px*pSz, y=cy-pSz/2+py*pSz;
                nctx.beginPath(); nctx.arc(x,y,pr,0,Math.PI*2); nctx.fill();
            }
        }
    }
}

function updStatus(){if(!state)return;const el=$('status-msg'),me=state.currentPlayer===myP,p=state.phase;
    if(p==='PIE_PLACE')el.innerText=me?'PLACE OPENING TILE':'OPPONENT PLACING...';
    else if(p==='PIE_DECISION')el.innerText=me?'PIE RULE: SWAP OR CONTINUE?':'OPPONENT DECIDING...';
    else if(p==='PEEK' || p==='ACTION'){
        if(!me) el.innerText="OPPONENT'S TURN";
        else if(pending) {
            if(pending.type === 'peek_or_reinforce' || pending.type === 'peek_only') el.innerText = 'CHOOSE ACTION';
            else el.innerText = 'CONFIRM MOVE?';
        }
        else if(strikeTarget && !strikeFrom) el.innerText='SELECT YOUR TILE TO STRIKE FROM';
        else el.innerText='YOUR TURN';
    }
    else if(p==='GAME_OVER')el.innerText='GAME OVER';}

function updBar(){
    const bar=$('action-bar');bar.innerHTML='';if(!state)return;const me=state.currentPlayer===myP,p=state.phase;
    
    // Pie Decision Buttons integrated right into the Action Bar
    if(p === 'PIE_DECISION' && me){
        mkBtn(bar, 'SWAP (TAKE WHITE)', 'ab go', () => sendPie(true));
        mkBtn(bar, 'CONTINUE (STAY BLACK)', 'ab', () => sendPie(false));
        return;
    }

    if(me && pending){
        if(pending.type === 'peek_or_reinforce'){
            mkBtn(bar, 'PEEK', 'ab', () => {
                socket.emit('action', {roomId, type: 'peek', r: pending.r, c: pending.c});
                pending = null;
            });
            mkBtn(bar, 'REINFORCE', 'ab go', () => {
                if (p === 'PEEK') socket.emit('action', {roomId, type: 'skipPeek'});
                socket.emit('action', {roomId, type: 'reinforce', r: pending.r, c: pending.c});
                pending = null;
            });
            mkBtn(bar, 'CANCEL', 'ab no', () => { pending = null; updStatus(); updBar(); draw(); });
            return;
        }
        if(pending.type === 'peek_only'){
            mkBtn(bar, 'PEEK', 'ab', () => {
                socket.emit('action', {roomId, type: 'peek', r: pending.r, c: pending.c});
                pending = null;
            });
            mkBtn(bar, 'CANCEL', 'ab no', () => { pending = null; updStatus(); updBar(); draw(); });
            return;
        }

        mkBtn(bar, 'CONFIRM', 'ab go', () => {
            if (p === 'PEEK' && pending.type !== 'place') socket.emit('action', {roomId, type: 'skipPeek'});
            socket.emit('action', {roomId, ...pending});
            pending = null;
        });
        mkBtn(bar, 'UNDO', 'ab no', () => { pending = null; strikeTarget = null; strikeFrom = null; updStatus(); updBar(); draw(); });
        return;
    }

    if((p === 'ACTION' || p === 'PEEK') && me){
        if (strikeTarget) {
            mkBtn(bar, 'CANCEL', 'ab no', () => { strikeTarget = null; strikeFrom = null; updStatus(); updBar(); draw(); });
            return;
        }
        const se = state.supplies[myP] === 0;
        if (se && !hasStr()) mkBtn(bar, 'PASS', 'ab', () => {
            if (p === 'PEEK') socket.emit('action', {roomId, type: 'skipPeek'});
            socket.emit('action', {roomId, type: 'pass'});
        });
    }
}

function mkBtn(p,txt,cls,fn){const b=document.createElement('button');b.className=cls;b.innerText=txt;b.onclick=fn;p.appendChild(b);}

function hasStr(){if(!state)return false;const b=state.board;for(let r=0;r<BS;r++)for(let c=0;c<BS;c++)if(b[r][c].owner===myP&&b[r][c].tiles.length>0)for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const rr=r+dr,cc=c+dc;if(rr>=0&&rr<BS&&cc>=0&&cc<BS&&b[rr][cc].owner&&b[rr][cc].owner!==myP&&b[rr][cc].tiles.length>0)return true;}return false;}

function updLog(){if(!state||!state.gameLog||!state.gameLog.length)return;$('combat-log').classList.remove('hidden');$('ll').innerHTML=state.gameLog.map(l=>`<div>${l}</div>`).join('');}

function copyLog() {
    if(!state || !state.gameLog) return;
    const txt = state.gameLog.slice().reverse().join('\n');
    navigator.clipboard.writeText(txt).then(() => {
        const btn = $('go-copy');
        btn.innerText = 'COPIED!';
        setTimeout(() => btn.innerText = 'COPY GAME LOG', 2000);
    }).catch(err => {
        console.error("Failed to copy log", err);
    });
}

function phaseUI(){if(!state)return;
    if(state.phase==='GAME_OVER'){clearS();const w=state.winner;let t,r;if(!w){t='DRAW';r=state.winCondition||'';}else{t=w===myP?'YOU WIN':'YOU LOSE';r=`${w===1?'White':'Black'} wins: ${state.winCondition}`;}$('go-t').innerText=t;$('go-r').innerText=r;$('game-over').classList.remove('hidden');}}

// ═══ DRAWING ═══
function draw(){
    ctx.clearRect(0,0,CW,CW);
    
    // Board background (Lighter Outer Cells)
    ctx.fillStyle='#ece9e4';
    roundRect(ctx,MG-4,MG-4,BPX+8,BPX+8,6);ctx.fill();
    
    drawGrid();drawLabels();
    if(!state)return;
    for(let r=0;r<BS;r++)for(let c=0;c<BS;c++)drawCell(r,c,state.board[r][c]);
    
    // Pending move preview
    if(pending){
        const{r,c}=pending;
        ctx.save();
        const cx=cX(c),cy=cY(r);
        
        if(pending.type==='deploy' || pending.type==='place'){
            ctx.globalAlpha=.4;
            ctx.fillStyle=myP===1?'#f8f8f8':'#1a1a1a';roundRect(ctx,cx-TS/2,cy-TS/2,TS,TS,6);ctx.fill();
            if(myP===1){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3;roundRect(ctx,cx-TS/2,cy-TS/2,TS,TS,6);ctx.stroke();}
            
            // Render Pips for preview
            if(state.myNextDraw){
                ctx.globalAlpha=1.0;
                drawPips(cx, cy, TS*0.7, state.myNextDraw, myP===1?'#1a1a1a':'#fff');
            }
        }else if(pending.type==='reinforce' || pending.type==='peek_or_reinforce' || pending.type==='peek_only'){
            ctx.globalAlpha=.4;
            ctx.strokeStyle='#3c78dc';ctx.lineWidth=4;roundRect(ctx,cx-TS/2-4,cy-TS/2-4,TS+8,TS+8,8);ctx.stroke();
        }
        ctx.restore();
    }
    if(strikeFrom&&strikeTarget){
        ctx.save();ctx.globalAlpha=.6;ctx.strokeStyle=var_red;ctx.lineWidth=4;
        ctx.beginPath();ctx.moveTo(cX(strikeFrom.c),cY(strikeFrom.r));ctx.lineTo(cX(strikeTarget.c),cY(strikeTarget.r));ctx.stroke();
        ctx.restore();
    }
    drawLastMove();drawKo();
}
const var_red='#c0392b';

function drawGrid(){
    // Center 3x3 Kill Zone (Darker)
    ctx.fillStyle = '#d6d1c8'; 
    ctx.fillRect(MG + 2*CL, MG + 2*CL, 3*CL, 3*CL);
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 2.5;
    ctx.strokeRect(MG + 2*CL, MG + 2*CL, 3*CL, 3*CL);

    // Thick grid lines
    ctx.strokeStyle='#b8b4ac';ctx.lineWidth=2;
    for(let i=0;i<=BS;i++){const x=MG+i*CL,y=MG+i*CL;
        ctx.beginPath();ctx.moveTo(x,MG);ctx.lineTo(x,MG+BS*CL);ctx.stroke();
        ctx.beginPath();ctx.moveTo(MG,y);ctx.lineTo(MG+BS*CL,y);ctx.stroke();}
        
    if(!state||state.currentPlayer!==myP)return;
    const b=state.board;
    for(let r=0;r<BS;r++)for(let c=0;c<BS;c++){
        let hl=null;
        if(state.phase==='PEEK' && !pending && !strikeTarget){
            if(b[r][c].owner===myP&&b[r][c].tiles.length>0&&b[r][c].tiles.some(t=>!t.faceUp)) hl='rgba(160,80,200,.15)';
        }else if((state.phase==='PEEK' || state.phase==='ACTION') && strikeTarget && !strikeFrom){
            if(b[r][c].owner===myP&&b[r][c].tiles.length>0&&Math.abs(r-strikeTarget.r)+Math.abs(c-strikeTarget.c)===1)hl='rgba(192,57,43,.15)';
        }
        if(hl){ctx.fillStyle=hl;ctx.fillRect(MG+c*CL+1,MG+r*CL+1,CL-2,CL-2);}
    }
}

function drawLabels(){ctx.fillStyle='#999';ctx.font=`600 ${Math.round(CL*.2)}px Helvetica Neue,Arial,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    for(let i=0;i<BS;i++){ctx.fillText(String(i+1),MG+i*CL+CL/2,MG/2);ctx.fillText(String(i+1),MG/2,MG+i*CL+CL/2);}}

function drawCell(r,c,cell){
    const cx=cX(c),cy=cY(r);
    if(!cell.tiles||cell.tiles.length===0)return; 
    const isStk=cell.tiles.length===2,top=cell.tiles[cell.tiles.length-1];
    
    if(isStk){ctx.save();ctx.globalAlpha=.3;drawTileShape(cx+4,cy+4,TS*.86,top.owner);ctx.restore();}
    drawTileShape(cx,cy,TS,top.owner);

    const oppPeeked=state.oppPeeked||[];
    if(oppPeeked.includes(`${r},${c}`)){
        ctx.fillStyle='rgba(160,80,200,.6)';ctx.beginPath();ctx.arc(cx+TS/2-6,cy-TS/2+6,4,0,Math.PI*2);ctx.fill();
    }

    if(top.value!==null){
        if(isStk){
            const total=cell.tiles.reduce((s,t)=>s+(t.value||0),0);
            if(total<=6){drawPips(cx,cy,TS*.7,total,top.owner===1?'#1a1a1a':'#fff');}
            else{ctx.font=`900 ${Math.round(TS*.42)}px Helvetica Neue,Arial,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=top.owner===1?'#1a1a1a':'#fff';ctx.fillText(String(total),cx,cy);}
        }else{
            drawPips(cx,cy,TS*.7,top.value,top.owner===1?'#1a1a1a':'#fff');
        }
    }
    
    if(isStk){ctx.fillStyle=var_gold;ctx.font=`800 ${Math.round(TS*.17)}px Helvetica Neue,Arial,sans-serif`;ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText('\u00d72',cx+TS/2-2,cy-TS/2+2);}
    if(top.faceUp){ctx.strokeStyle=var_gold;ctx.lineWidth=2.5;roundRect(ctx,cx-TS/2,cy-TS/2,TS,TS,6);ctx.stroke();}
    if(strikeTarget&&strikeTarget.r===r&&strikeTarget.c===c){ctx.strokeStyle=var_red;ctx.lineWidth=3;roundRect(ctx,cx-TS/2-3,cy-TS/2-3,TS+6,TS+6,8);ctx.stroke();}
    if(strikeFrom&&strikeFrom.r===r&&strikeFrom.c===c){ctx.strokeStyle='#27ae60';ctx.lineWidth=3;roundRect(ctx,cx-TS/2-3,cy-TS/2-3,TS+6,TS+6,8);ctx.stroke();}
}
const var_gold='#c9a84c';

function drawTileShape(cx,cy,sz,owner){
    const h=sz/2;
    ctx.fillStyle=owner===1?'#fafafa':'#1a1a1a';
    ctx.shadowColor='rgba(0,0,0,.12)';ctx.shadowBlur=6;
    roundRect(ctx,cx-h,cy-h,sz,sz,6);ctx.fill();ctx.shadowBlur=0;
    if(owner===1){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3.5;roundRect(ctx,cx-h,cy-h,sz,sz,6);ctx.stroke();}
}

function drawLastMove(){if(!state||!state.lastMove)return;const{player:p,r,c}=state.lastMove,cx=cX(c),cy=cY(r);
    ctx.strokeStyle=p===1?'rgba(0,0,0,.65)':'rgba(255,255,255,.75)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);ctx.stroke();}

function drawKo(){if(!state)return;const ko=state.ko[myP];if(!ko)return;const cx=cX(ko.c),cy=cY(ko.r),h=CL/2-5;
    ctx.strokeStyle='rgba(192,57,43,.6)';ctx.lineWidth=3;roundRect(ctx,cx-h,cy-h,h*2,h*2,8);ctx.stroke();}

function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

// ═══ CLICKS ═══
cv.addEventListener('click',e=>{if(!state)return;const rect=cv.getBoundingClientRect(),sx=cv.width/rect.width,sy=cv.height/rect.height;const x=(e.clientX-rect.left)*sx,y=(e.clientY-rect.top)*sy;const c=Math.floor((x-MG)/CL),r=Math.floor((y-MG)/CL);if(r<0||r>=BS||c<0||c>=BS)return;handleClick(r,c);});
cv.addEventListener('touchend',e=>{e.preventDefault();if(!state)return;const t=e.changedTouches[0],rect=cv.getBoundingClientRect(),sx=cv.width/rect.width,sy=cv.height/rect.height;const x=(t.clientX-rect.left)*sx,y=(t.clientY-rect.top)*sy;const c=Math.floor((x-MG)/CL),r=Math.floor((y-MG)/CL);if(r<0||r>=BS||c<0||c>=BS)return;handleClick(r,c);},{passive:false});

function handleClick(r,c){
    const p=state.phase,me=state.currentPlayer===myP;if(p==='GAME_OVER'||!me)return;
    const b=state.board,cell=b[r][c];
    
    if(p==='PIE_PLACE'){if(cell.tiles.length===0){pending={type:'place',r,c};updStatus();updBar();draw();}return;}
    
    // Unified PEEK and ACTION handling
    if(p==='PEEK' || p==='ACTION'){
        if(pending && pending.type !== 'peek_or_reinforce' && pending.type !== 'peek_only'){
            pending=null;updStatus();updBar();draw();return;
        } 
        
        if(strikeTarget&&!strikeFrom){
            if(cell.owner===myP&&cell.tiles.length>0&&Math.abs(r-strikeTarget.r)+Math.abs(c-strikeTarget.c)===1){
                strikeFrom={r,c};pending={type:'strike',r:strikeFrom.r,c:strikeFrom.c,r2:strikeTarget.r,c2:strikeTarget.c};updStatus();updBar();draw();
            }else{strikeTarget=null;updStatus();updBar();draw();}
            return;
        }
        
        const se=state.supplies[myP]===0;
        
        // Empty = deploy
        if(cell.tiles.length===0&&!se){
            const ko=state.ko[myP];if(ko&&ko.r===r&&ko.c===c)return;
            pending={type:'deploy',r,c};updStatus();updBar();draw();return;
        }
        
        // Own tile = Peek and/or Reinforce
        if(cell.owner===myP&&cell.tiles.length>0){
            const canPeek = (p === 'PEEK' && cell.tiles.some(t => !t.faceUp));
            const canReinforce = (cell.tiles.length === 1 && !se);

            if (canPeek && canReinforce) {
                pending = {type: 'peek_or_reinforce', r, c};
            } else if (canPeek) {
                pending = {type: 'peek_only', r, c};
            } else if (canReinforce) {
                pending = {type: 'reinforce', r, c};
            } else {
                pending = null;
            }
            updStatus(); updBar(); draw();
            return;
        }
        
        // Enemy = start strike
        if(cell.owner&&cell.owner!==myP&&cell.tiles.length>0){
            let has=false;for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const rr=r+dr,cc=c+dc;if(rr>=0&&rr<BS&&cc>=0&&cc<BS&&b[rr][cc].owner===myP&&b[rr][cc].tiles.length>0)has=true;}
            if(has){strikeTarget={r,c};strikeFrom=null;updStatus();updBar();draw();}
            return;
        }
    }
}

function showFlash(msg){const el=$('peek-flash');el.innerText=msg;el.classList.remove('hidden');el.style.opacity='1';setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.classList.add('hidden'),400);},3000);}
draw();
</script>
