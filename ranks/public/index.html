<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RANKS v0.6.1</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg:#f4f4f4; --ui-bg:#fff; --shadow:0 4px 20px rgba(0,0,0,.13); --red:#d9534f; --text:#333; }
        * { box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; margin:0; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
        h1 { margin:24px 0 16px; letter-spacing:10px; font-size:clamp(1.6rem,4vw,2.4rem); font-weight:900; text-transform:uppercase; color:#222; text-align:center; }
        .hidden { display:none!important; }

        /* LOBBY */
        .overlay { position:fixed; inset:0; background:rgba(244,244,244,.98); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:200; }
        #lobby-screen input { padding:16px; font-size:1.3rem; text-align:center; border:2px solid #333; margin-bottom:14px; border-radius:6px; width:280px; max-width:80%; text-transform:uppercase; letter-spacing:4px; }
        .big-btn { padding:18px 48px; font-size:1.4rem; background:#222; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:700; text-transform:uppercase; letter-spacing:2px; }
        .big-btn:hover { transform:scale(1.03); }
        #lobby-create { margin-top:14px; padding:12px 28px; font-size:.95rem; background:var(--ui-bg); color:#333; border:2px solid #ccc; border-radius:8px; cursor:pointer; font-weight:700; text-transform:uppercase; }
        #lobby-hint { margin-top:16px; color:#888; font-size:.85rem; text-align:center; max-width:320px; line-height:1.5; }
        #lobby-msg { color:var(--red); margin-top:16px; font-weight:bold; }

        /* GAME */
        #game-container { display:flex; flex-direction:column; align-items:center; width:100%; max-width:960px; padding:0 10px 60px; }
        #top-bar { display:flex; align-items:center; gap:10px; width:100%; max-width:720px; margin-bottom:10px; flex-wrap:wrap; justify-content:center; }
        #status-msg { font-weight:800; font-size:.95rem; letter-spacing:1px; text-transform:uppercase; padding:8px 16px; background:var(--ui-bg); border-radius:20px; box-shadow:var(--shadow); }

        /* HUD */
        #hud { background:var(--ui-bg); padding:12px 16px; border-radius:10px; box-shadow:var(--shadow); width:100%; max-width:720px; margin-bottom:10px; font-size:.85rem; display:flex; gap:16px; justify-content:space-between; flex-wrap:wrap; }
        .hud-section { display:flex; flex-direction:column; gap:2px; }
        .hud-section b { font-size:.75rem; text-transform:uppercase; letter-spacing:1px; color:#888; }

        /* BOARD */
        #canvas-wrapper { position:relative; width:min(88vmin, 620px); height:min(88vmin, 620px); }
        canvas { width:100%; height:100%; display:block; }

        /* ACTION BAR */
        #action-bar { display:flex; gap:8px; margin:12px 0; flex-wrap:wrap; justify-content:center; }
        .action-btn { padding:10px 20px; font-size:.9rem; font-weight:700; border:2px solid #999; border-radius:8px; cursor:pointer; background:var(--ui-bg); text-transform:uppercase; letter-spacing:1px; transition:all .15s; }
        .action-btn:hover { border-color:#333; }
        .action-btn.active { background:#222; color:#fff; border-color:#222; }
        .action-btn:disabled { opacity:.4; cursor:default; }

        /* NEXT DRAW */
        #next-draw { background:var(--ui-bg); padding:10px 16px; border-radius:10px; box-shadow:var(--shadow); margin:8px 0; font-size:.85rem; text-align:center; }
        #next-draw .val { font-size:1.6rem; font-weight:900; }

        /* LOG */
        #combat-log { background:var(--ui-bg); padding:12px 16px; border-radius:10px; box-shadow:var(--shadow); width:100%; max-width:720px; margin-top:12px; max-height:200px; overflow-y:auto; font-family:'SF Mono',monospace; font-size:.78rem; line-height:1.5; }

        /* GAME OVER */
        #game-over { position:fixed; inset:0; z-index:300; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        #go-backdrop { position:absolute; inset:0; background:rgba(0,0,0,.6); }
        #go-bubble { position:relative; background:#fff; border-radius:16px; padding:32px 28px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,.3); max-width:400px; width:90%; }
        #go-title { font-size:2rem; font-weight:900; letter-spacing:4px; margin-bottom:10px; }
        #go-reason { font-size:1rem; color:#555; margin-bottom:20px; line-height:1.5; }
        .go-btn { padding:14px 28px; font-size:1rem; font-weight:700; border:none; border-radius:8px; cursor:pointer; margin:4px; }
        .go-btn-primary { background:#222; color:#fff; }
        .go-btn-secondary { background:#eee; color:#333; }

        /* PIE OVERLAY */
        #pie-overlay { position:fixed; inset:0; background:rgba(244,244,244,.96); display:flex; justify-content:center; align-items:center; z-index:250; }
        #pie-bubble { background:#fff; border-radius:16px; padding:28px; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,.2); }
        .pie-btn { padding:14px 28px; font-size:1.1rem; font-weight:700; border:none; border-radius:8px; cursor:pointer; margin:6px; }
        .pie-swap { background:#222; color:#fff; }
        .pie-continue { background:#eee; color:#333; }

        /* PEEK FLASH */
        #peek-flash { position:fixed; top:20%; left:50%; transform:translateX(-50%); background:#222; color:#fff; padding:16px 32px; border-radius:40px; font-weight:900; font-size:1.1rem; letter-spacing:2px; z-index:300; box-shadow:0 6px 28px rgba(0,0,0,.3); transition:opacity .4s; }

        #waiting-msg { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:var(--ui-bg); color:#555; padding:14px 28px; border-radius:40px; font-weight:700; z-index:200; box-shadow:var(--shadow); }

        @media (max-width:600px) {
            #hud { font-size:.75rem; gap:8px; padding:8px 10px; }
            .action-btn { padding:8px 14px; font-size:.8rem; }
        }
    </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby-screen" class="overlay">
    <h1 style="letter-spacing:12px;">RANKS</h1>
    <input type="text" id="room-input" placeholder="ROOM CODE" autocomplete="off" onkeydown="if(event.key==='Enter')joinGame()" oninput="this.value=this.value.toUpperCase()">
    <button class="big-btn" onclick="joinGame()">JOIN GAME</button>
    <button id="lobby-create" onclick="createRoom()">CREATE ROOM</button>
    <p id="lobby-hint">Enter <b>PLAYAI</b> to challenge the AI &middot; Create or enter a room code for 2-player</p>
    <p id="lobby-msg"></p>
</div>

<!-- GAME -->
<div id="game-container" class="hidden">
    <h1>RANKS</h1>
    <div id="hud">
        <div class="hud-section"><b>White (P1)</b><span>Supply: <span id="p1-supply">24</span></span></div>
        <div class="hud-section"><b>Black (P2)</b><span>Supply: <span id="p2-supply">24</span></span></div>
        <div class="hud-section"><b>You</b><span id="player-identity">...</span></div>
        <div class="hud-section"><b>Qualify</b><span id="qual-display">0 / 21</span></div>
    </div>
    <div id="top-bar"><span id="status-msg">Waiting...</span></div>
    <div id="canvas-wrapper"><canvas id="gameCanvas" width="700" height="700"></canvas></div>
    <div id="next-draw"></div>
    <div id="action-bar"></div>
    <div id="combat-log" class="hidden"><div id="log-lines"></div></div>
</div>

<!-- GAME OVER -->
<div id="game-over" class="hidden">
    <div id="go-backdrop"></div>
    <div id="go-bubble">
        <div id="go-title">GAME OVER</div>
        <div id="go-reason"></div>
        <div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;">
            <button class="go-btn go-btn-primary" onclick="location.reload()">MAIN MENU</button>
        </div>
    </div>
</div>

<!-- PIE OVERLAY -->
<div id="pie-overlay" class="hidden">
    <div id="pie-bubble">
        <h3>The Pie Rule</h3>
        <p>Your opponent placed the opening tile.<br>You may <b>SWAP</b> sides or <b>CONTINUE</b> as P2.</p>
        <div><button class="pie-btn pie-swap" onclick="sendPieDecision(true)">SWAP</button><button class="pie-btn pie-continue" onclick="sendPieDecision(false)">CONTINUE</button></div>
    </div>
</div>

<div id="peek-flash" class="hidden"></div>
<div id="waiting-msg" class="hidden">Waiting for opponent...</div>

<script>
const socket = io();
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let state = null, myPlayer = 0, roomId = null;
let actionMode = null; // 'deploy','reinforce','strike', null
let strikeFrom = null; // {r,c} selected attacker for strike

const BSIZE = 7;
const CANVAS_W = 700;
const MARGIN = 48;
const BOARD_PX = CANVAS_W - MARGIN*2;
const CELL = BOARD_PX / BSIZE;
const TILE_SZ = CELL * 0.74;

function cellX(c) { return MARGIN + c*CELL + CELL/2; }
function cellY(r) { return MARGIN + r*CELL + CELL/2; }

// Session
function saveSession() { try { sessionStorage.setItem('ranks_room',roomId); sessionStorage.setItem('ranks_player',myPlayer); } catch(e){} }
function clearSession() { try { sessionStorage.removeItem('ranks_room'); sessionStorage.removeItem('ranks_player'); } catch(e){} }
socket.on('connect', () => {
    try {
        const r = sessionStorage.getItem('ranks_room'), p = parseInt(sessionStorage.getItem('ranks_player'));
        if (r && p) socket.emit('rejoinGame', {roomId:r, player:p});
    } catch(e) {}
});
socket.on('rejoinFailed', () => { clearSession(); document.getElementById('game-container').classList.add('hidden'); document.getElementById('lobby-screen').classList.remove('hidden'); });

// Lobby
function joinGame() { const v=document.getElementById('room-input').value.toUpperCase().trim(); if(!v)return; roomId=v; socket.emit('joinGame',roomId); }
function createRoom() { const c='ABCDEFGHJKLMNPQRSTUVWXYZ'; const code=Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join(''); document.getElementById('room-input').value=code; document.getElementById('lobby-msg').innerText=`Room ${code} created. Share this code.`; }
function sendPieDecision(swap) { socket.emit('action',{roomId,type:'pieDecision',swap}); document.getElementById('pie-overlay').classList.add('hidden'); }

// Socket events
socket.on('init', (data) => {
    myPlayer=data.player; if(data.roomId)roomId=data.roomId; saveSession();
    document.getElementById('lobby-screen').classList.add('hidden');
    document.getElementById('game-container').classList.remove('hidden');
    document.getElementById('waiting-msg').classList.add('hidden');
    document.getElementById('player-identity').innerText = myPlayer===1?'White (P1)':'Black (P2)';
    draw();
});
socket.on('waiting', () => { document.getElementById('lobby-screen').classList.add('hidden'); document.getElementById('game-container').classList.remove('hidden'); document.getElementById('waiting-msg').classList.remove('hidden'); });
socket.on('update', (s) => { state=s; actionMode=null; strikeFrom=null; updateAll(); });
socket.on('roomFull', () => { document.getElementById('lobby-msg').innerText='Room is full.'; });
socket.on('peekResult', (data) => { showPeekFlash(`PEEK (${data.r+1},${data.c+1}): ${data.values.join(', ')}`); });

function updateAll() {
    if(!state)return;
    document.getElementById('waiting-msg').classList.add('hidden');
    document.getElementById('p1-supply').innerText=state.supplies[1];
    document.getElementById('p2-supply').innerText=state.supplies[2];
    updateNextDraw();
    updateStatus();
    updateActionBar();
    updateLog();
    draw();
    handlePhaseUI();
}

function updateNextDraw() {
    const el=document.getElementById('next-draw');
    if(!state || state.myNextDraw===null) { el.innerHTML='<b>Next Draw:</b> none'; return; }
    el.innerHTML=`<b>Next Draw:</b> <span class="val">${state.myNextDraw}</span>`;
}

function updateStatus() {
    if(!state)return;
    const el=document.getElementById('status-msg');
    const isMe=state.currentPlayer===myPlayer;
    const p=state.phase;
    if(p==='PIE_PLACE') el.innerText=isMe?'PLACE OPENING TILE':'OPPONENT PLACING...';
    else if(p==='PIE_DECISION') el.innerText=myPlayer===2?'SWAP OR CONTINUE?':'OPPONENT DECIDING...';
    else if(p==='PEEK') el.innerText=isMe?'PEEK AT OWN TILE (OR SKIP)':'OPPONENT PEEKING...';
    else if(p==='ACTION') {
        if(isMe) {
            if(actionMode==='deploy') el.innerText='SELECT EMPTY CELL TO DEPLOY';
            else if(actionMode==='reinforce') el.innerText='SELECT YOUR SINGLE TILE TO REINFORCE';
            else if(actionMode==='strike'&&!strikeFrom) el.innerText='SELECT YOUR TILE TO STRIKE FROM';
            else if(actionMode==='strike'&&strikeFrom) el.innerText='SELECT ADJACENT ENEMY TO ATTACK';
            else el.innerText='CHOOSE AN ACTION';
        } else el.innerText="OPPONENT'S TURN";
    }
    else if(p==='GAME_OVER') el.innerText='GAME OVER';
}

function updateActionBar() {
    const bar=document.getElementById('action-bar');
    bar.innerHTML='';
    if(!state)return;
    const isMe=state.currentPlayer===myPlayer;
    const p=state.phase;

    if(p==='PEEK' && isMe) {
        const skip=document.createElement('button'); skip.className='action-btn'; skip.innerText='SKIP PEEK';
        skip.onclick=()=>socket.emit('action',{roomId,type:'skipPeek'});
        bar.appendChild(skip);
        const hint=document.createElement('span'); hint.style.cssText='font-size:.8rem;color:#888;padding:10px;';
        hint.innerText='Click your own face-down tile to peek, or skip';
        bar.appendChild(hint);
        return;
    }

    if(p==='ACTION' && isMe) {
        const supplyEmpty=state.supplies[myPlayer]===0;
        if(!supplyEmpty) {
            const d=document.createElement('button'); d.className='action-btn'+(actionMode==='deploy'?' active':''); d.innerText='DEPLOY';
            d.onclick=()=>{actionMode='deploy';strikeFrom=null;updateStatus();updateActionBar();draw();};
            bar.appendChild(d);
            const r=document.createElement('button'); r.className='action-btn'+(actionMode==='reinforce'?' active':''); r.innerText='REINFORCE';
            r.onclick=()=>{actionMode='reinforce';strikeFrom=null;updateStatus();updateActionBar();draw();};
            bar.appendChild(r);
        }
        const s=document.createElement('button'); s.className='action-btn'+(actionMode==='strike'?' active':''); s.innerText='STRIKE';
        s.onclick=()=>{actionMode='strike';strikeFrom=null;updateStatus();updateActionBar();draw();};
        bar.appendChild(s);
        if(supplyEmpty && !hasLegalStrikes()) {
            const ps=document.createElement('button'); ps.className='action-btn'; ps.innerText='PASS';
            ps.onclick=()=>socket.emit('action',{roomId,type:'pass'});
            bar.appendChild(ps);
        }
        if(actionMode) {
            const c=document.createElement('button'); c.className='action-btn'; c.innerText='CANCEL'; c.style.borderColor='#c33';
            c.onclick=()=>{actionMode=null;strikeFrom=null;updateStatus();updateActionBar();draw();};
            bar.appendChild(c);
        }
    }
}

function hasLegalStrikes() {
    if(!state)return false;
    const b=state.board;
    for(let r=0;r<BSIZE;r++) for(let c=0;c<BSIZE;c++) {
        const cell=b[r][c];
        if(cell.owner===myPlayer && cell.tiles.length>0) {
            for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                const rr=r+dr,cc=c+dc;
                if(rr>=0&&rr<BSIZE&&cc>=0&&cc<BSIZE) {
                    const t=b[rr][cc];
                    if(t.owner && t.owner!==myPlayer && t.tiles.length>0) return true;
                }
            }
        }
    }
    return false;
}

function updateLog() {
    if(!state||!state.gameLog||!state.gameLog.length)return;
    const el=document.getElementById('combat-log');
    el.classList.remove('hidden');
    document.getElementById('log-lines').innerHTML=state.gameLog.map(l=>`<div>${l}</div>`).join('');
}

function handlePhaseUI() {
    if(!state)return;
    document.getElementById('pie-overlay').classList.toggle('hidden', !(state.phase==='PIE_DECISION'&&myPlayer===2));
    if(state.phase==='GAME_OVER') {
        clearSession();
        const w=state.winner;
        let title,reason;
        if(!w) { title='DRAW'; reason=state.winCondition||''; }
        else { title=(w===myPlayer)?'YOU WIN':'YOU LOSE'; reason=`${w===1?'White':'Black'} wins: ${state.winCondition}`; }
        document.getElementById('go-title').innerText=title;
        document.getElementById('go-reason').innerText=reason;
        document.getElementById('game-over').classList.remove('hidden');
    }
}

// ═══ DRAWING ═══
function draw() {
    ctx.clearRect(0,0,CANVAS_W,CANVAS_W);
    drawGrid();
    drawLabels();
    if(!state)return;
    const b=state.board;
    for(let r=0;r<BSIZE;r++) for(let c=0;c<BSIZE;c++) drawCell(r,c,b[r][c]);
    drawLastMove();
    drawKo();
}

function drawGrid() {
    ctx.strokeStyle='#ddd'; ctx.lineWidth=1;
    for(let i=0;i<=BSIZE;i++) {
        const x=MARGIN+i*CELL, y=MARGIN+i*CELL;
        ctx.beginPath(); ctx.moveTo(x,MARGIN); ctx.lineTo(x,MARGIN+BSIZE*CELL); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(MARGIN,y); ctx.lineTo(MARGIN+BSIZE*CELL,y); ctx.stroke();
    }
    // Highlights
    if(!state||state.currentPlayer!==myPlayer)return;
    for(let r=0;r<BSIZE;r++) for(let c=0;c<BSIZE;c++) {
        let hl=null;
        if(state.phase==='PEEK') {
            const cell=state.board[r][c];
            if(cell.owner===myPlayer && cell.tiles.length>0 && cell.tiles.some(t=>!t.faceUp))
                hl='rgba(180,60,200,.12)';
        } else if(state.phase==='ACTION'&&actionMode==='deploy') {
            const cell=state.board[r][c];
            if(cell.tiles.length===0) {
                const ko=state.ko[myPlayer];
                if(!(ko&&ko.r===r&&ko.c===c)) hl='rgba(80,180,80,.15)';
            }
        } else if(state.phase==='ACTION'&&actionMode==='reinforce') {
            const cell=state.board[r][c];
            if(cell.owner===myPlayer&&cell.tiles.length===1) hl='rgba(60,120,220,.15)';
        } else if(state.phase==='ACTION'&&actionMode==='strike') {
            if(!strikeFrom) {
                const cell=state.board[r][c];
                if(cell.owner===myPlayer&&cell.tiles.length>0) {
                    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                        const rr=r+dr,cc=c+dc;
                        if(rr>=0&&rr<BSIZE&&cc>=0&&cc<BSIZE&&state.board[rr][cc].owner&&state.board[rr][cc].owner!==myPlayer&&state.board[rr][cc].tiles.length>0)
                            { hl='rgba(220,80,60,.15)'; break; }
                    }
                }
            } else {
                if(Math.abs(r-strikeFrom.r)+Math.abs(c-strikeFrom.c)===1) {
                    const cell=state.board[r][c];
                    if(cell.owner&&cell.owner!==myPlayer&&cell.tiles.length>0) hl='rgba(220,40,40,.25)';
                }
            }
        }
        if(hl) { ctx.fillStyle=hl; ctx.fillRect(MARGIN+c*CELL+1,MARGIN+r*CELL+1,CELL-2,CELL-2); }
    }
}

function drawLabels() {
    ctx.fillStyle='#aaa'; ctx.font=`bold ${Math.round(CELL*.22)}px Helvetica Neue,Arial,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for(let i=0;i<BSIZE;i++) {
        ctx.fillText(String(i+1), MARGIN+i*CELL+CELL/2, MARGIN/2);
        ctx.fillText(String(i+1), MARGIN/2, MARGIN+i*CELL+CELL/2);
    }
}

function drawCell(r, c, cell) {
    const cx=cellX(c), cy=cellY(r);
    if(!cell.tiles||cell.tiles.length===0) {
        ctx.fillStyle='#ccc'; ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
        return;
    }
    const isStack=cell.tiles.length===2;
    const top=cell.tiles[cell.tiles.length-1];
    const isOwn=top.owner===myPlayer;

    // Stack shadow
    if(isStack) {
        ctx.save(); ctx.globalAlpha=.35;
        drawTile(cx+3,cy+3,TILE_SZ*.88,cell.tiles[0]);
        ctx.restore();
    }

    drawTile(cx,cy,TILE_SZ,top);

    // Value
    const showVal=top.faceUp||isOwn;
    if(showVal) {
        let val;
        if(isStack) {
            val=cell.tiles.reduce((s,t)=>s+(t.value||0),0);
        } else {
            val=top.value;
        }
        if(val!==null) {
            ctx.font=`900 ${Math.round(TILE_SZ*.44)}px Helvetica Neue,Arial,sans-serif`;
            ctx.textAlign='center'; ctx.textBaseline='middle';
            if(top.faceUp) ctx.fillStyle=top.owner===1?'#1a1a1a':'#fff';
            else { ctx.fillStyle=top.owner===1?'rgba(0,0,0,.3)':'rgba(255,255,255,.3)'; ctx.font=`700 ${Math.round(TILE_SZ*.36)}px Helvetica Neue,Arial,sans-serif`; }
            ctx.fillText(String(val),cx,cy);
        }
    }

    // Stack badge
    if(isStack) {
        ctx.fillStyle='#d4af37'; ctx.font=`900 ${Math.round(TILE_SZ*.2)}px Helvetica Neue,Arial,sans-serif`;
        ctx.textAlign='right'; ctx.textBaseline='top';
        ctx.fillText('\u00d72',cx+TILE_SZ/2-3,cy-TILE_SZ/2+2);
    }

    // Face-up glow
    if(top.faceUp) {
        ctx.strokeStyle='#d4af37'; ctx.lineWidth=2;
        roundRect(ctx,cx-TILE_SZ/2,cy-TILE_SZ/2,TILE_SZ,TILE_SZ,5); ctx.stroke();
    }

    // Strike-from highlight
    if(strikeFrom&&strikeFrom.r===r&&strikeFrom.c===c) {
        ctx.strokeStyle='#e22'; ctx.lineWidth=3;
        roundRect(ctx,cx-TILE_SZ/2-3,cy-TILE_SZ/2-3,TILE_SZ+6,TILE_SZ+6,8); ctx.stroke();
    }
}

function drawTile(cx,cy,sz,tile) {
    const half=sz/2;
    ctx.fillStyle=tile.owner===1?'#f8f8f8':'#1a1a1a';
    ctx.shadowColor='rgba(0,0,0,.15)'; ctx.shadowBlur=5;
    roundRect(ctx,cx-half,cy-half,sz,sz,6); ctx.fill();
    ctx.shadowBlur=0;
    if(tile.owner===1) { ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2; roundRect(ctx,cx-half,cy-half,sz,sz,6); ctx.stroke(); }
}

function drawLastMove() {
    if(!state||!state.lastMove)return;
    const {player,r,c}=state.lastMove;
    const cx=cellX(c), cy=cellY(r);
    ctx.strokeStyle=player===1?'rgba(0,0,0,.7)':'rgba(255,255,255,.8)';
    ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2); ctx.stroke();
}

function drawKo() {
    if(!state)return;
    const ko=state.ko[myPlayer];
    if(!ko)return;
    const cx=cellX(ko.c), cy=cellY(ko.r);
    ctx.strokeStyle='rgba(220,40,40,.8)'; ctx.lineWidth=3;
    const half=CELL/2-4;
    roundRect(ctx,cx-half,cy-half,half*2,half*2,8); ctx.stroke();
}

function roundRect(ctx,x,y,w,h,r) {
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ═══ INTERACTION ═══
canvas.addEventListener('click', (e) => {
    if(!state)return;
    const rect=canvas.getBoundingClientRect();
    const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    const x=(e.clientX-rect.left)*sx, y=(e.clientY-rect.top)*sy;
    const c=Math.floor((x-MARGIN)/CELL), r=Math.floor((y-MARGIN)/CELL);
    if(r<0||r>=BSIZE||c<0||c>=BSIZE)return;
    handleClick(r,c);
});
canvas.addEventListener('touchend', (e) => {
    e.preventDefault(); if(!state)return;
    const t=e.changedTouches[0], rect=canvas.getBoundingClientRect();
    const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    const x=(t.clientX-rect.left)*sx, y=(t.clientY-rect.top)*sy;
    const c=Math.floor((x-MARGIN)/CELL), r=Math.floor((y-MARGIN)/CELL);
    if(r<0||r>=BSIZE||c<0||c>=BSIZE)return;
    handleClick(r,c);
}, {passive:false});

function handleClick(r,c) {
    const p=state.phase;
    const isMe=state.currentPlayer===myPlayer;
    if(p==='GAME_OVER'||!isMe)return;
    const cell=state.board[r][c];

    // PIE_PLACE
    if(p==='PIE_PLACE') {
        if(cell.tiles.length===0) socket.emit('action',{roomId,type:'place',r,c});
        return;
    }

    // PEEK
    if(p==='PEEK') {
        if(cell.owner===myPlayer&&cell.tiles.length>0&&cell.tiles.some(t=>!t.faceUp))
            socket.emit('action',{roomId,type:'peek',r,c});
        return;
    }

    // ACTION
    if(p==='ACTION') {
        if(actionMode==='deploy') {
            if(cell.tiles.length===0) {
                const ko=state.ko[myPlayer];
                if(ko&&ko.r===r&&ko.c===c) return;
                socket.emit('action',{roomId,type:'deploy',r,c});
            }
        } else if(actionMode==='reinforce') {
            if(cell.owner===myPlayer&&cell.tiles.length===1)
                socket.emit('action',{roomId,type:'reinforce',r,c});
        } else if(actionMode==='strike') {
            if(!strikeFrom) {
                // Select attacker
                if(cell.owner===myPlayer&&cell.tiles.length>0) {
                    let hasTarget=false;
                    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                        const rr=r+dr,cc=c+dc;
                        if(rr>=0&&rr<BSIZE&&cc>=0&&cc<BSIZE&&state.board[rr][cc].owner&&state.board[rr][cc].owner!==myPlayer&&state.board[rr][cc].tiles.length>0)
                            hasTarget=true;
                    }
                    if(hasTarget) { strikeFrom={r,c}; updateStatus(); draw(); }
                }
            } else {
                // Select target
                if(Math.abs(r-strikeFrom.r)+Math.abs(c-strikeFrom.c)===1&&cell.owner&&cell.owner!==myPlayer&&cell.tiles.length>0) {
                    socket.emit('action',{roomId,type:'strike',r:strikeFrom.r,c:strikeFrom.c,r2:r,c2:c});
                    strikeFrom=null;
                } else {
                    // Click own tile = change attacker, click elsewhere = deselect
                    if(cell.owner===myPlayer&&cell.tiles.length>0) { strikeFrom={r,c}; updateStatus(); draw(); }
                    else { strikeFrom=null; updateStatus(); draw(); }
                }
            }
        }
    }
}

function showPeekFlash(msg) {
    const el=document.getElementById('peek-flash');
    el.innerText=msg; el.classList.remove('hidden'); el.style.opacity='1';
    setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.classList.add('hidden'),400);},3000);
}

draw();
</script>
